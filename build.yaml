# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  # ─── Bluetooth-only build (no dongle) ─────────────────────────────────
  # The left half is the split central and pairs directly with the host over
  # Bluetooth; the right half is its peripheral. This is the default,
  # dongle-less setup — flash freezetor_left + freezetor_right.
  - board: nice_nano_v2
    shield: freezetor_left
    artifact-name: freezetor_left
  - board: nice_nano_v2
    shield: freezetor_right
    artifact-name: freezetor_right

  # ─── Dongle + keyboard build ──────────────────────────────────────────
  # The dongle is the split central and pairs with the host; both halves are
  # peripherals. Flash freezetor_dongle + freezetor_left_dongle_peripheral +
  # freezetor_right_dongle_peripheral. The left half must be rebuilt as a
  # peripheral (its default role is central); the right half is already a
  # peripheral but is rebuilt here so each mode has a self-contained set.
  - board: nice_nano_v2
    shield: freezetor_dongle
    artifact-name: freezetor_dongle
  - board: nice_nano_v2
    shield: freezetor_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: freezetor_left_dongle_peripheral
  - board: nice_nano_v2
    shield: freezetor_right
    artifact-name: freezetor_right_dongle_peripheral
